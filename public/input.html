<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>コメント入力</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      color: #eee;
      font-family: 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
      padding: 24px;
    }

    h1 {
      font-size: 20px;
      color: #aaa;
      letter-spacing: 0.05em;
    }

    #form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 480px;
    }

    #text {
      font-size: 18px;
      padding: 12px 16px;
      border-radius: 8px;
      border: 2px solid #444;
      background: #222;
      color: #fff;
      outline: none;
      transition: border-color 0.2s;
    }

    #text:focus { border-color: #e00; }

    .row {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    label { font-size: 14px; color: #888; }

    #color {
      width: 40px;
      height: 32px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      background: none;
      padding: 0;
    }

    #send {
      flex: 1;
      padding: 12px;
      font-size: 16px;
      font-weight: bold;
      background: #e00;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #send:hover { background: #c00; }
    #send:disabled { background: #555; cursor: default; }

    #status {
      font-size: 13px;
      color: #666;
    }

    #status.connected { color: #4c4; }
    #status.disconnected { color: #c44; }

    #log {
      width: 100%;
      max-width: 480px;
      max-height: 200px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .log-item {
      font-size: 13px;
      padding: 4px 8px;
      background: #1a1a1a;
      border-radius: 4px;
      color: #aaa;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }
  </style>
</head>
<body>
  <h1>コメント入力</h1>

  <div id="form">
    <input id="text" type="text" placeholder="コメントを入力..." maxlength="100" autofocus>
    <div class="row">
      <label for="color">色</label>
      <input id="color" type="color" value="#ffffff">
      <button id="send" disabled>送信</button>
    </div>
  </div>

  <div id="status" class="disconnected">接続中...</div>
  <div id="log"></div>

  <script>
    const textEl = document.getElementById('text');
    const colorEl = document.getElementById('color');
    const sendEl = document.getElementById('send');
    const statusEl = document.getElementById('status');
    const logEl = document.getElementById('log');

    function addLog(text, color) {
      const div = document.createElement('div');
      div.className = 'log-item';
      div.style.borderLeft = `3px solid ${color}`;
      div.textContent = text;
      logEl.prepend(div);
      // 最大30件
      while (logEl.children.length > 30) logEl.lastChild.remove();
    }

    function send() {
      const text = textEl.value.trim();
      if (!text || ws.readyState !== WebSocket.OPEN) return;
      const color = colorEl.value;
      ws.send(JSON.stringify({ type: 'comment', text, color }));
      addLog(text, color);
      textEl.value = '';
      textEl.focus();
    }

    sendEl.addEventListener('click', send);
    textEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') send();
    });

    const ws = new WebSocket(`ws://${location.host}`);

    ws.onopen = () => {
      sendEl.disabled = false;
      statusEl.textContent = '接続済み';
      statusEl.className = 'connected';
    };

    ws.onclose = () => {
      sendEl.disabled = true;
      statusEl.textContent = '切断 — 再接続中...';
      statusEl.className = 'disconnected';
      setTimeout(() => location.reload(), 3000);
    };
  </script>
</body>
</html>
