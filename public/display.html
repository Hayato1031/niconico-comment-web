<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>コメント表示</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      font-family: 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
    }

    #status {
      position: fixed;
      top: 8px;
      left: 12px;
      font-size: 12px;
      color: #555;
      z-index: 10;
    }

    .comment {
      position: absolute;
      white-space: nowrap;
      font-size: 32px;
      font-weight: bold;
      color: #fff;
      text-shadow:
        1px  1px 0 #000,
       -1px  1px 0 #000,
        1px -1px 0 #000,
       -1px -1px 0 #000;
      pointer-events: none;
      will-change: transform;
    }
  </style>
</head>
<body>
  <div id="status">接続中...</div>

  <script>
    const status = document.getElementById('status');

    // 縦位置をトラック管理して重ならないようにする
    const TRACK_COUNT = 12;
    const trackFreeAt = new Array(TRACK_COUNT).fill(0); // 各トラックが空く時刻(ms)

    function getTrack() {
      const now = Date.now();
      let best = 0;
      for (let i = 1; i < TRACK_COUNT; i++) {
        if (trackFreeAt[i] < trackFreeAt[best]) best = i;
      }
      return best;
    }

    function spawnComment(text, color) {
      const el = document.createElement('div');
      el.className = 'comment';
      el.textContent = text;
      if (color) el.style.color = color;
      document.body.appendChild(el);

      // 幅を測るために一度非表示で配置
      el.style.visibility = 'hidden';
      el.style.left = '100vw';

      requestAnimationFrame(() => {
        const W = window.innerWidth;
        const H = window.innerHeight;
        const commentW = el.offsetWidth;
        const trackIndex = getTrack();
        const trackH = Math.floor(H / TRACK_COUNT);
        const topPx = trackIndex * trackH + (trackH - el.offsetHeight) / 2;

        // 流れる時間: 画面幅 + コメント幅を一定速度で
        const SPEED = 300; // px/s
        const distance = W + commentW;
        const duration = distance / SPEED;

        // このトラックが空く時刻を更新（コメント先頭が画面右端に来るまでの時間 + 少し余裕）
        const clearDelay = (commentW / SPEED) * 1000 + 200;
        trackFreeAt[trackIndex] = Date.now() + clearDelay;

        el.style.top = `${topPx}px`;
        el.style.left = `${W}px`;
        el.style.visibility = 'visible';
        el.style.transition = `transform ${duration.toFixed(2)}s linear`;
        el.style.transform = `translateX(-${distance}px)`;

        el.addEventListener('transitionend', () => el.remove());
      });
    }

    // WebSocket
    const ws = new WebSocket(`ws://${location.host}`);

    ws.onopen = () => {
      status.textContent = '接続済み';
      setTimeout(() => { status.style.display = 'none'; }, 2000);
    };

    ws.onclose = () => {
      status.style.display = 'block';
      status.textContent = '切断 — 再接続中...';
      setTimeout(() => location.reload(), 3000);
    };

    ws.onmessage = (e) => {
      const data = JSON.parse(e.data);
      if (data.type === 'comment') {
        spawnComment(data.text, data.color);
      }
    };
  </script>
</body>
</html>
